# ============================================================
# APP TRIGGER
# When a release is published, creates a GitHub Issue
# in the ops repo requesting deployment approval.
# Admin reviews issue and adds "approved" label to deploy.
#
# HOW TO DEPLOY:
# 1. Push your code to main as normal
# 2. When ready → create a Release in GitHub
#    Releases → Create new release → Tag: v1.0.0 → Publish
# 3. This trigger creates an issue in ops repo
# 4. Admin approves → app deploys automatically
#
# GITEA MIGRATION:
# - Replace api.github.com with gitea.company.internal/api/v1
# - Replace cbcbmbtTest with Gitea org name
# - Update issue creation endpoint for Gitea API
# ============================================================

name: Request Deployment

on:
  release:
    types: [published]

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment issue
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.REGISTRY_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/cbcbmbtTest/ops/issues \
            -d '{
              "title": "Deploy ${{ github.event.repository.name }} ${{ github.event.release.tag_name }}",
              "body": "## Deployment Request\n\n**App:** ${{ github.event.repository.name }}\n**Version:** ${{ github.event.release.tag_name }}\n**Released:** ${{ github.event.release.created_at }}\n**Release notes:** ${{ github.event.release.html_url }}\n\nTo approve: change label to approved\nTo reject: close this issue",
              "labels": ["pending approval"]
            }'
